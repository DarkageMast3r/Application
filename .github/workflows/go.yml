# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.0'

    - name: Upload windows build artifacts abc
      uses: actions/upload-artifact@v4
      with:
        name: result
        path: .
    - name: Data
      run: go tool dist list
        
    - name: Build
      run: go build -v ./service-discovery/main.go

    - name: Test
      run: go test -v ./service-discovery/main.go
      
    - name: Generate windows build artifacts
      run: env GOOS=windows go build -o service_discovery.exe ./service-discovery/main.go
      
    - name: Generate linux build artifacts
      run: env GOOS=linux go build -o app_service_discovery ./service-discovery/main.go
      
    - name: Upload windows build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_win.exe
        path: service_discovery.exe
        
    - name: Upload linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_linux
        path: app_service_discovery
