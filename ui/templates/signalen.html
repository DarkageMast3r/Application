{{define "signalen.html"}}
<div class="card">
    <h3>📊 Openstaande Signalen</h3>
    <div class="client-list" id="signaalList">
        <a class="btn btn-primary" style="text-decoration: none;" href="/Selection">Openstaande signalen beheren</a>
    </div>
</div>

<div class="card">
    <h3>🚨 Nieuw Signaal Registreren</h3>
    <form action="/App/api/signals/create" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Cliënt ID</label>
                <input type="text" name="client_id" placeholder="bijv. C001" required>
            </div>
            <div class="form-group">
                <label>Naam</label>
                <input type="text" name="name" required>
            </div>
        </div>
        <div class="form-group">
            <label>Beschrijving</label>
            <textarea name="description" placeholder="Beschrijf het signaal..." rows="2" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">📝 Signaal Registreren</button>
    </form>
</div>
{{end}}
