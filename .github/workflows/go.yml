# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.0'
     
    - name: Build service discovery
      run: |
        cd service-discovery
        env GOOS=windows
        go build -o ../service_discovery.exe
        env GOOS=linux GOARCH=arm 
        go build -o ../app_service_discovery
      
    - name: Build service signaling
      run: |
        cd service-signalering
        env GOOS=windows
        go build -o ../service-signalering.exe
        env GOOS=linux GOARCH=arm
        go build -o ../app_service_signalering
      
    - name: Upload windows build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_win
        path: |
          service_discovery.exe
          service_signalering.exe
        
    - name: Upload linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_linux
        path: |
          app_service_discovery
          app_service_signalering
