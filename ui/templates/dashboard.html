{{define "dashboard.html"}}
<div class="stats-grid" id="dashboardStats">
    <div class="stat-card">
        <div class="stat-number" data-stat="activeClients">-</div>
        <div class="stat-label">Actieve Cases</div>
    </div>
    <div class="stat-card">
        <div class="stat-number" data-stat="pendingSignals">-</div>
        <div class="stat-label">In Behandeling</div>
    </div>
    <div class="stat-card">
        <div class="stat-number" data-stat="activeTech">-</div>
        <div class="stat-label">Beschikbare Technologieën</div>
    </div>
    <div class="stat-card">
        <div class="stat-number" data-stat="budgetUsed">-</div>
        <div class="stat-label">Budget Gebruikt</div>
    </div>
</div>

<div class="card">
    <h3>📋 Recente Activiteiten</h3>
    <div class="timeline" id="recentActivities">
        <div class="loading">Activiteiten laden...</div>
    </div>
</div>
