# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.0'

    - name: Build
      run: go build -v service-discovery/...

    - name: Test
      run: go test -v service-discovery/...
      
    - name: Generate windows build artifacts
      run: cd service-discovery && env GOOS=windows go build -o app.exe && cd ..
      
    - name: Generate linux build artifacts
      run: cd service-discovery && env GOOS=LINUX go build -o app && cd ..
      
    - name: Upload windows build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_win.exe
        path: app.exe
        
    - name: Upload linux build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app_lin
        path: app
