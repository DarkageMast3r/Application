services:
  postgres:
    image: postgres:15
    container_name: signalering-postgres
    environment:
      POSTGRES_DB: signalering
      POSTGRES_USER: signalering_user
      POSTGRES_PASSWORD: signalering_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalering_user -d signalering"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: